name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string
      ci_sha:
        description: 'Tested source SHA. Leave empty to discover it from the tag commit or a VERSION-only parent commit.'
        required: false
        type: string
      simple_release:
        description: 'Simple release: only x86_64 GHCR image, skip other artifacts'
        required: false
        type: boolean
        default: false

# 环境变量：tag push 触发时读取 repository variable；workflow_dispatch 时只使用输入参数。
# 这样自动发布显式传 simple_release=false 时，不会被 vars.SIMPLE_RELEASE 覆盖。
env:
  SIMPLE_RELEASE: ${{ (github.event_name == 'workflow_dispatch' && inputs.simple_release == true) || (github.event_name != 'workflow_dispatch' && vars.SIMPLE_RELEASE == 'true') }}

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate release tag and CI provenance
    runs-on: ubuntu-latest
    outputs:
      ci_sha: ${{ steps.release.outputs.ci_sha }}
      tag: ${{ steps.release.outputs.tag }}
      target_sha: ${{ steps.release.outputs.target_sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Validate tag, release order, and successful CI
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CI_SHA: ${{ inputs.ci_sha }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          has_successful_ci() {
            local sha="$1"
            local runs_json
            runs_json="$(gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/backend-ci.yml/runs" \
              -f head_sha="$sha" \
              -f status=completed \
              -f per_page=100)"
            jq -e --arg branch "$DEFAULT_BRANCH" '
              [.workflow_runs[] |
                select(.conclusion == "success" and
                       .event == "push" and
                       .head_branch == $branch)] |
              length > 0
            ' <<< "$runs_json" >/dev/null
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_NAME="$INPUT_TAG"
          else
            TAG_NAME="$REF_NAME"
          fi
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must be numeric semver: vX.Y.Z" >&2
            exit 1
          fi

          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${TAG_NAME}^{commit}" >/dev/null; then
            echo "tag ${TAG_NAME} does not exist" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          TARGET_SHA="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
          LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#v}"
            HIGHEST_VERSION="$(printf '%s\n%s\n' "$VERSION" "$LATEST_VERSION" | sort -V | tail -n 1)"
            if [ "$VERSION" != "$LATEST_VERSION" ] && [ "$HIGHEST_VERSION" = "$LATEST_VERSION" ]; then
              echo "refusing to publish older ${TAG_NAME}; latest release tag is ${LATEST_TAG}" >&2
              exit 1
            fi
          fi

          CI_SHA="$INPUT_CI_SHA"
          if [ -n "$CI_SHA" ]; then
            if ! [[ "$CI_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "ci_sha must be a full commit SHA" >&2
              exit 1
            fi
            CI_SHA="$(git rev-parse "${CI_SHA}^{commit}")"
          else
            CI_SHA="$TARGET_SHA"
            if ! has_successful_ci "$CI_SHA"; then
              TAG_PARENTS="$(git show -s --format=%P "$TARGET_SHA")"
              if [[ "$TAG_PARENTS" =~ ^[0-9a-fA-F]{40}$ ]] &&
                 [ "$(git diff --name-only "$TAG_PARENTS" "$TARGET_SHA")" = "backend/cmd/server/VERSION" ] &&
                 has_successful_ci "$TAG_PARENTS"; then
                CI_SHA="$TAG_PARENTS"
              else
                echo "No successful CI push run found for tag ${TAG_NAME} or its VERSION-only parent" >&2
                exit 1
              fi
            fi
          fi

          if [ "$TARGET_SHA" != "$CI_SHA" ]; then
            TAG_PARENTS="$(git show -s --format=%P "$TARGET_SHA")"
            if [ "$TAG_PARENTS" != "$CI_SHA" ] ||
               [ "$(git diff --name-only "$CI_SHA" "$TARGET_SHA")" != "backend/cmd/server/VERSION" ]; then
              echo "tag ${TAG_NAME} is not the tested SHA or a single VERSION-only child" >&2
              exit 1
            fi
          fi
          if ! has_successful_ci "$CI_SHA"; then
            echo "No successful CI push run found for ${CI_SHA}" >&2
            exit 1
          fi

          echo "$VERSION" > backend/cmd/server/VERSION
          echo "ci_sha=${CI_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Validated ${TAG_NAME} from CI-tested source ${CI_SHA}"

      - name: Upload VERSION artifact
        uses: actions/upload-artifact@v7
        with:
          name: version-file
          path: backend/cmd/server/VERSION
          retention-days: 1

  build-frontend:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
          retention-days: 1

  release:
    needs: [prepare, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download VERSION artifact
        uses: actions/download-artifact@v8
        with:
          name: version-file
          path: backend/cmd/server/

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: backend/internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.5'

      # Docker setup for GoReleaser
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tags with annotations
        run: |
          # 确保获取完整的 annotated tag 信息
          git fetch --tags --force

      - name: Get tag message
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Processing tag: $TAG_NAME"

          # 获取完整的 tag message（跳过第一行标题）
          TAG_MESSAGE="$(git tag -l --format='%(contents:body)' "$TAG_NAME")"

          # 调试输出
          echo "Tag message length: ${#TAG_MESSAGE}"

          # GITHUB_ENV 的 multiline delimiter 必须不可预测，且不能出现在内容中。
          while true; do
            DELIMITER="TAG_MESSAGE_$(openssl rand -hex 16)"
            if ! grep -Fqx -- "$DELIMITER" <<< "$TAG_MESSAGE"; then
              break
            fi
          done
          {
            printf 'TAG_MESSAGE<<%s\n' "$DELIMITER"
            printf '%s\n' "$TAG_MESSAGE"
            printf '%s\n' "$DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Set lowercase owner for GHCR
        id: lowercase
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        shell: bash
        run: echo "owner=${REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean --skip=validate ${{ env.SIMPLE_RELEASE == 'true' && '--config=.goreleaser.simple.yaml' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'skip' }}

      # Update DockerHub description
      - name: Update DockerHub description
        if: ${{ env.SIMPLE_RELEASE != 'true' && env.DOCKERHUB_USERNAME != '' }}
        uses: peter-evans/dockerhub-description@v5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/sub2api
          short-description: "Sub2API - AI API Gateway Platform"
          readme-filepath: ./deploy/DOCKER.md

      # Send Telegram notification
      - name: Send Telegram Notification
        if: ${{ env.SIMPLE_RELEASE != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        continue-on-error: true
        run: |
          # 检查必要的环境变量
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi

          VERSION="${TAG_NAME#v}"
          REPO="$GITHUB_REPOSITORY"
          GHCR_IMAGE="ghcr.io/${REPO,,}"  # ${,,} converts to lowercase

          # 获取 tag message 内容并转义 Markdown 特殊字符
          TAG_MESSAGE="$(printf '%s' "${TAG_MESSAGE:-}" | sed 's/\([_*`\[]\)/\\\1/g')"

          # 限制消息长度（Telegram 消息限制 4096 字符，预留空间给头尾固定内容）
          if [ "${#TAG_MESSAGE}" -gt 3500 ]; then
            TAG_MESSAGE="${TAG_MESSAGE:0:3500}..."
          fi

          # 构建消息内容
          MESSAGE="🚀 *Sub2API 新版本发布！*"$'\n'$'\n'
          MESSAGE+="📦 版本号: \`${VERSION}\`"$'\n'$'\n'

          # 添加更新内容
          if [ -n "$TAG_MESSAGE" ]; then
            MESSAGE+="${TAG_MESSAGE}"$'\n'$'\n'
          fi

          MESSAGE+="🐳 *Docker 部署:*"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          # 根据是否配置 DockerHub 动态生成
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            DOCKER_IMAGE="${DOCKERHUB_USERNAME}/sub2api"
            MESSAGE+="# Docker Hub"$'\n'
            MESSAGE+="docker pull ${DOCKER_IMAGE}:${VERSION}"$'\n'
            MESSAGE+="# GitHub Container Registry"$'\n'
          fi
          MESSAGE+="docker pull ${GHCR_IMAGE}:${VERSION}"$'\n'
          MESSAGE+="\`\`\`"$'\n'$'\n'
          MESSAGE+="🔗 *相关链接:*"$'\n'
          MESSAGE+="• [GitHub Release](https://github.com/${REPO}/releases/tag/${TAG_NAME})"$'\n'
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            MESSAGE+="• [Docker Hub](https://hub.docker.com/r/${DOCKER_IMAGE})"$'\n'
          fi
          MESSAGE+="• [GitHub Packages](https://github.com/${REPO}/pkgs/container/sub2api)"$'\n'$'\n'
          MESSAGE+="#Sub2API #Release #${TAG_NAME//./_}"

          # 发送消息
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "${TELEGRAM_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "Markdown",
                disable_web_page_preview: true
              }')"

  sync-version-file:
    needs: [prepare, release]
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync VERSION file to released tag
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION || true)"
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "VERSION file already matches $VERSION"
            exit 0
          fi
          if [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            HIGHEST_VERSION="$(printf '%s\n%s\n' "$VERSION" "$CURRENT_VERSION" | sort -V | tail -n 1)"
            if [ "$HIGHEST_VERSION" = "$CURRENT_VERSION" ]; then
              echo "Skipping VERSION regression from ${CURRENT_VERSION} to ${VERSION}"
              exit 0
            fi
          fi

          echo "$VERSION" > backend/cmd/server/VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/cmd/server/VERSION
          git commit -m "chore: sync VERSION to ${VERSION} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"
