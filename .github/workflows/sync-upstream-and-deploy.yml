name: Sync upstream and deploy

on:
  schedule:
    # Run once per day, off the top of the hour to avoid schedule congestion.
    - cron: '17 16 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Rebuild and deploy the current main commit when upstream has no new commits
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sub2api-upstream-sync-deploy
  cancel-in-progress: false

env:
  DEFAULT_BRANCH: main
  UPSTREAM_REPOSITORY: Wei-Shaw/sub2api
  DEPLOY_HOST: ${{ vars.SUB2API_DEPLOY_HOST || '43.130.1.35' }}
  DEPLOY_PORT: ${{ vars.SUB2API_DEPLOY_SSH_PORT || '443' }}
  DEPLOY_USER: ${{ vars.SUB2API_DEPLOY_USER || 'root' }}
  DEPLOY_PATH: ${{ vars.SUB2API_DEPLOY_PATH || '/opt/sub2api' }}

jobs:
  sync-test-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Configure Git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Fetch and merge upstream when it is ahead
        id: source
        env:
          FORCE_DEPLOY: ${{ inputs.force_deploy || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags upstream "${DEFAULT_BRANCH}"

          upstream_ref="upstream/${DEFAULT_BRANCH}"
          upstream_sha="$(git rev-parse "$upstream_ref")"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$upstream_ref" HEAD; then
            echo 'has_update=false' >> "$GITHUB_OUTPUT"
            if [ "$FORCE_DEPLOY" = 'true' ]; then
              echo 'should_release=true' >> "$GITHUB_OUTPUT"
              echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            else
              echo 'should_release=false' >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if ! git merge --no-ff --no-edit "$upstream_ref"; then
            echo 'Upstream merge conflict. Fork main was left unchanged.' >&2
            exit 1
          fi

          echo 'has_update=true' >> "$GITHUB_OUTPUT"
          echo 'should_release=true' >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate deployment configuration
        if: steps.source.outputs.should_release == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.SUB2API_DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          case "$DEPLOY_PATH" in
            /opt/sub2api) ;;
            *) echo 'SUB2API_DEPLOY_PATH must be /opt/sub2api for the existing systemd service.' >&2; exit 1 ;;
          esac

          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo 'Set SUB2API_DEPLOY_SSH_KEY before releasing.' >&2
            exit 1
          fi

      - name: Set up Go
        if: steps.source.outputs.should_release == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        if: steps.source.outputs.should_release == 'true'
        run: go version | grep -q 'go1.26.5'

      - name: Run backend tests
        if: steps.source.outputs.should_release == 'true'
        working-directory: backend
        run: |
          make test-unit
          make test-integration

      - name: Run Go linter
        if: steps.source.outputs.should_release == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m
          working-directory: backend

      - name: Set up pnpm
        if: steps.source.outputs.should_release == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        if: steps.source.outputs.should_release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Run frontend checks
        if: steps.source.outputs.should_release == 'true'
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          cd ..
          make test-frontend

      - name: Build Linux release binary
        if: steps.source.outputs.should_release == 'true'
        id: binary
        shell: bash
        run: |
          set -euo pipefail

          make build
          install -m 755 backend/bin/server "$RUNNER_TEMP/sub2api"
          echo "sha256=$(sha256sum "$RUNNER_TEMP/sub2api" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Push tested merge to fork main
        if: steps.source.outputs.has_update == 'true'
        run: git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"

      - name: Configure SSH
        if: steps.source.outputs.should_release == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.SUB2API_DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/known_hosts <<'EOF'
          [43.130.1.35]:443 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPHKaMazQeZq6MVWYR5Lkm7YIQ1cTtTNIi5hkkrln14+
          EOF

      - name: Transfer tested binary
        if: steps.source.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_options=(-p "$DEPLOY_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes)

          scp "${ssh_options[@]}" "$RUNNER_TEMP/sub2api" "$target:$DEPLOY_PATH/sub2api.next"

      - name: Deploy and roll back on failed health check
        if: steps.source.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_options=(-p "$DEPLOY_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes)

          ssh "${ssh_options[@]}" "$target" bash -s -- \
            "$DEPLOY_PATH" \
            '${{ steps.binary.outputs.sha256 }}' <<'REMOTE'
          set -euo pipefail

          deploy_path="$1"
          expected_sha256="$2"
          cd "$deploy_path"

          if [ "$deploy_path" != '/opt/sub2api' ]; then
            echo 'Refusing to deploy outside /opt/sub2api.' >&2
            exit 1
          fi
          if ! id -u sub2api >/dev/null 2>&1; then
            echo 'The sub2api service account is missing.' >&2
            exit 1
          fi
          if ! systemctl is-active --quiet sub2api.service; then
            echo 'sub2api.service is not active; refusing an automatic replacement.' >&2
            exit 1
          fi
          if [ ! -x sub2api ] || [ ! -f sub2api.next ]; then
            echo 'Current or replacement binary is missing.' >&2
            exit 1
          fi
          if [ "$(sha256sum sub2api.next | awk '{print $1}')" != "$expected_sha256" ]; then
            echo 'Transferred binary checksum does not match the CI artifact.' >&2
            exit 1
          fi

          timestamp="$(date -u +%Y%m%d%H%M%S)"
          backup_path="$deploy_path/backups/sub2api.auto-$timestamp"
          install -d -m 700 "$deploy_path/backups"
          cp --preserve=mode,ownership,timestamps sub2api "$backup_path"

          rollback() {
            echo 'New release failed its health check; restoring the previous binary.' >&2
            systemctl stop sub2api.service || true
            install -m 755 -o sub2api -g sub2api "$backup_path" "$deploy_path/sub2api"
            systemctl start sub2api.service
            for attempt in $(seq 1 12); do
              if curl --fail --silent --show-error --max-time 5 http://127.0.0.1:8080/health >/dev/null; then
                echo 'Previous binary is healthy again. Database migrations are intentionally not rolled back.' >&2
                return 0
              fi
              sleep 5
            done
            echo 'Rollback binary did not pass its health check. Database migrations are intentionally not rolled back.' >&2
            return 1
          }

          install -m 755 -o sub2api -g sub2api sub2api.next sub2api
          rm -f sub2api.next
          if ! systemctl restart sub2api.service; then
            rollback
            exit 1
          fi

          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error --max-time 5 http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          rollback
          exit 1
          REMOTE
