name: Sync upstream and deploy

on:
  schedule:
    # Run once per day, off the top of the hour to avoid schedule congestion.
    - cron: '17 16 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Rebuild and deploy the current main commit when upstream has no new commits
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: sub2api-upstream-sync-deploy
  cancel-in-progress: false

env:
  DEFAULT_BRANCH: main
  UPSTREAM_REPOSITORY: Wei-Shaw/sub2api
  DEPLOY_HOST: ${{ vars.SUB2API_DEPLOY_HOST || '43.130.1.35' }}
  DEPLOY_PORT: ${{ vars.SUB2API_DEPLOY_SSH_PORT || '443' }}
  DEPLOY_USER: ${{ vars.SUB2API_DEPLOY_USER || 'root' }}
  DEPLOY_PATH: ${{ vars.SUB2API_DEPLOY_PATH || '/opt/sub2api' }}

jobs:
  sync-test-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Configure Git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Fetch and merge upstream when it is ahead
        id: source
        env:
          FORCE_DEPLOY: ${{ inputs.force_deploy || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags upstream "${DEFAULT_BRANCH}"

          upstream_ref="upstream/${DEFAULT_BRANCH}"
          upstream_sha="$(git rev-parse "$upstream_ref")"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$upstream_ref" HEAD; then
            echo 'has_update=false' >> "$GITHUB_OUTPUT"
            if [ "$FORCE_DEPLOY" = 'true' ]; then
              echo 'should_release=true' >> "$GITHUB_OUTPUT"
              echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            else
              echo 'should_release=false' >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if ! git merge --no-ff --no-edit "$upstream_ref"; then
            echo 'Upstream merge conflict. Fork main was left unchanged.' >&2
            exit 1
          fi

          echo 'has_update=true' >> "$GITHUB_OUTPUT"
          echo 'should_release=true' >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate deployment configuration
        if: steps.source.outputs.should_release == 'true'
        env:
          DEPLOY_ENV_FILE: ${{ secrets.SUB2API_DEPLOY_ENV }}
          DEPLOY_SSH_KEY: ${{ secrets.SUB2API_DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          case "$DEPLOY_PATH" in
            /opt/*) ;;
            *) echo 'SUB2API_DEPLOY_PATH must be an absolute path below /opt.' >&2; exit 1 ;;
          esac

          if [ -z "$DEPLOY_ENV_FILE" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo 'Set SUB2API_DEPLOY_ENV and SUB2API_DEPLOY_SSH_KEY before releasing.' >&2
            exit 1
          fi

      - name: Set up Go
        if: steps.source.outputs.should_release == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        if: steps.source.outputs.should_release == 'true'
        run: go version | grep -q 'go1.26.5'

      - name: Run backend tests
        if: steps.source.outputs.should_release == 'true'
        working-directory: backend
        run: |
          make test-unit
          make test-integration

      - name: Run Go linter
        if: steps.source.outputs.should_release == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m
          working-directory: backend

      - name: Set up pnpm
        if: steps.source.outputs.should_release == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        if: steps.source.outputs.should_release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Run frontend checks
        if: steps.source.outputs.should_release == 'true'
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          cd ..
          make test-frontend

      - name: Build release image
        if: steps.source.outputs.should_release == 'true'
        id: image
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          source_sha="${{ steps.source.outputs.source_sha }}"
          short_sha="${source_sha:0:7}"
          image_tag="sha-${short_sha}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          docker build \
            --file Dockerfile \
            --build-arg "VERSION=sync-${GITHUB_RUN_NUMBER}" \
            --build-arg "COMMIT=${source_sha}" \
            --build-arg "DATE=${build_date}" \
            --tag "${image}:${image_tag}" \
            .

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Publish immutable candidate image
        if: steps.source.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push candidate image
        if: steps.source.outputs.should_release == 'true'
        run: docker push '${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}'

      - name: Push tested merge to fork main
        if: steps.source.outputs.has_update == 'true'
        run: git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"

      - name: Publish main image tag
        if: steps.source.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker tag '${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}' '${{ steps.image.outputs.image }}:main'
          docker push '${{ steps.image.outputs.image }}:main'

      - name: Configure SSH
        if: steps.source.outputs.should_release == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.SUB2API_DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/known_hosts <<'EOF'
          [43.130.1.35]:443 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPHKaMazQeZq6MVWYR5Lkm7YIQ1cTtTNIi5hkkrln14+
          EOF

      - name: Transfer image and deployment files
        if: steps.source.outputs.should_release == 'true'
        env:
          DEPLOY_ENV_FILE: ${{ secrets.SUB2API_DEPLOY_ENV }}
        shell: bash
        run: |
          set -euo pipefail
          target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_options=(-p "$DEPLOY_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes)

          ssh "${ssh_options[@]}" "$target" "mkdir -p '$DEPLOY_PATH'"
          printf '%s' "$DEPLOY_ENV_FILE" > "$RUNNER_TEMP/sub2api.env"
          chmod 600 "$RUNNER_TEMP/sub2api.env"
          scp "${ssh_options[@]}" deploy/docker-compose.yml "$target:$DEPLOY_PATH/docker-compose.yml.next"
          scp "${ssh_options[@]}" "$RUNNER_TEMP/sub2api.env" "$target:$DEPLOY_PATH/.env.next"
          rm -f "$RUNNER_TEMP/sub2api.env"
          docker save '${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}' | gzip -1 | ssh "${ssh_options[@]}" "$target" 'gzip -dc | docker load'

      - name: Deploy and roll back on failed health check
        if: steps.source.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_options=(-p "$DEPLOY_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes)

          ssh "${ssh_options[@]}" "$target" bash -s -- \
            "$DEPLOY_PATH" \
            '${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}' <<'REMOTE'
          set -euo pipefail

          deploy_path="$1"
          requested_image="$2"
          cd "$deploy_path"

          mkdir -p .rollback
          previous_image_id="$(docker inspect --format '{{.Image}}' sub2api 2>/dev/null || true)"
          test -f docker-compose.yml && cp docker-compose.yml .rollback/docker-compose.yml || true
          test -f .env && cp .env .rollback/.env || true

          rollback() {
            echo 'New release failed its health check; restoring the previous application image.' >&2
            if [ -f .rollback/docker-compose.yml ]; then
              cp .rollback/docker-compose.yml docker-compose.yml
            fi
            if [ -f .rollback/.env ]; then
              cp .rollback/.env .env
            fi
            if [ -n "$previous_image_id" ]; then
              previous_image=''
              if [ -f .env ]; then
                previous_image="$(sed -n 's/^SUB2API_IMAGE=//p' .env | head -n 1)"
              fi
              if [ -n "$previous_image" ]; then
                docker tag "$previous_image_id" "$previous_image"
              fi
              docker compose -f docker-compose.yml up -d --no-build --force-recreate sub2api
              for attempt in $(seq 1 12); do
                if docker compose -f docker-compose.yml exec -T sub2api wget -q -T 5 -O /dev/null http://localhost:8080/health; then
                  echo 'Previous application image is healthy again.' >&2
                  return 0
                fi
                sleep 5
              done
              echo 'Rollback container did not pass its health check. Database migrations are intentionally not rolled back.' >&2
              return 1
            else
              docker compose -f docker-compose.yml rm -sf sub2api || true
            fi
          }

          mv docker-compose.yml.next docker-compose.yml
          mv .env.next .env
          if grep -q '^SUB2API_IMAGE=' .env; then
            sed -i "s|^SUB2API_IMAGE=.*|SUB2API_IMAGE=$requested_image|" .env
          else
            printf 'SUB2API_IMAGE=%s\n' "$requested_image" >> .env
          fi

          if ! docker compose -f docker-compose.yml config -q; then
            rollback
            exit 1
          fi
          if ! docker compose -f docker-compose.yml up -d --no-build --force-recreate sub2api; then
            rollback
            exit 1
          fi

          for attempt in $(seq 1 40); do
            if docker compose -f docker-compose.yml exec -T sub2api wget -q -T 5 -O /dev/null http://localhost:8080/health; then
              exit 0
            fi
            sleep 5
          done

          rollback
          exit 1
          REMOTE
